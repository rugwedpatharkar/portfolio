<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 · Rugwed Patharkar</title>
  <style>
    :root {
      --bg-void: #050609;
      --fg: #f5f7fc;
      --fg-dim: #b3b9c7;
      --fg-mute: #7c8391;
      --gold: #e9c675;
      --line: rgba(255,255,255,0.10);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Manrope', system-ui, sans-serif;
      background: var(--bg-void);
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container { max-width: 560px; text-align: left; }
    .kicker {
      font-family: ui-monospace, 'Geist Mono', monospace;
      font-size: 0.72rem;
      color: var(--fg-mute);
      letter-spacing: 0.28em;
      text-transform: uppercase;
      margin-bottom: 18px;
    }
    .rule { display: inline-block; width: 32px; height: 2px; background: var(--gold); vertical-align: middle; margin: 0 10px 3px 0; }
    h1 {
      font-family: 'Fraunces', 'DM Serif Display', Georgia, serif;
      font-weight: 400;
      font-size: clamp(3rem, 8vw, 5.5rem);
      line-height: 1.02;
      letter-spacing: -0.02em;
      margin-bottom: 0.35em;
    }
    h1 em { font-style: italic; color: var(--gold); }
    p {
      font-size: 1.02rem;
      color: var(--fg-dim);
      line-height: 1.55;
      margin-bottom: 2rem;
      max-width: 44ch;
    }
    a {
      display: inline-block;
      padding: 0.72rem 1.5rem;
      border: 1px solid var(--line);
      color: var(--gold);
      background: transparent;
      text-decoration: none;
      font-weight: 500;
      font-size: 0.95rem;
      letter-spacing: 0.02em;
      border-radius: 4px;
      transition: background 0.2s, border-color 0.2s;
    }
    a:hover, a:focus-visible { background: rgba(233,198,117,0.08); border-color: var(--gold); outline: none; }
  </style>
</head>
<body>
  <main class="container">
    <div class="kicker"><span class="rule"></span>Signal lost · 404</div>
    <h1>Off <em>the map.</em></h1>
    <p>The stop you tried to visit isn't on the tour. Head back to the Sun and I'll take you through the whole system from there.</p>
    <a href="/">Return to the Solar System</a>
  </main>
</body>
</html>
