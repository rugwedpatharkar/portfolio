<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - Page Not Found | Rugwed Patharkar</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #050816;
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 500px; }
    .code {
      font-size: 8rem;
      font-weight: 900;
      background: linear-gradient(90.13deg, #00cea8 1.9%, #bf61ff 97.5%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
    }
    h2 { font-size: 1.5rem; margin: 1rem 0; }
    p { color: #aaa6c3; margin: 1rem 0 2rem; font-size: 0.95rem; line-height: 1.6; }
    a {
      display: inline-block;
      padding: 0.75rem 2rem;
      background: linear-gradient(90.13deg, #00cea8 1.9%, #bf61ff 97.5%);
      color: white;
      text-decoration: none;
      border-radius: 50px;
      font-weight: 600;
      font-size: 0.9rem;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    a:hover { transform: scale(1.05); box-shadow: 0 4px 20px rgba(145, 94, 255, 0.4); }
  </style>
</head>
<body>
  <div class="container">
    <p class="code">404</p>
    <h2>Page Not Found</h2>
    <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
    <a href="/">Back to Portfolio</a>
  </div>
</body>
</html>
