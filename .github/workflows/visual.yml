# Playwright visual regression — runs the snapshot tests against the build.
# Snapshots live in tests/__screenshots__/; intentional changes ship with
# updated baselines via `npm run test:visual:update`.

name: Visual regression

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  visual:
    name: Playwright snapshots
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Run visual tests
        run: npx playwright test

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
